name: Build APK

on:
  push:
    branches:
      - main
      - develop
      - master
  pull_request:
    branches:
      - main
      - develop
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          ./gradlew app:assembleDebug -x lint \
            --build-cache \
            --parallel \
            --max-workers=4
        env:
          GRADLE_OPTS: -Xmx4g -Xms2g -XX:+HeapDumpOnOutOfMemoryError

      - name: Build release APK (fdroid flavor)
        run: |
          ./gradlew app:assembleFdroidRelease -x lint \
            --build-cache \
            --parallel \
            --max-workers=4
        env:
          GRADLE_OPTS: -Xmx4g -Xms2g -XX:+HeapDumpOnOutOfMemoryError
        continue-on-error: true

      - name: List APK outputs
        if: always()
        run: |
          echo "Debug APK:"
          find app/build/outputs/apk -name "*.apk" -type f
          echo ""
          echo "All outputs:"
          ls -lR app/build/outputs/

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/
          retention-days: 30

      - name: Upload release APK (fdroid)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: fdroid-release-apk
          path: app/build/outputs/apk/fdroidRelease/
          retention-days: 30
          
      - name: Comment on PR
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ APK build completed successfully!\n\nDownload APK artifacts from the workflow run.'
            })

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
