name: Build APK\n\non:\n  push:\n    branches:\n      - main\n      - develop\n      - master\n  pull_request:\n    branches:\n      - main\n      - develop\n      - master\n  workflow_dispatch:\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n    timeout-minutes: 60\n\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v4\n        with:\n          fetch-depth: 0\n\n      - name: Set up JDK 21\n        uses: actions/setup-java@v4\n        with:\n          java-version: '21'\n          distribution: 'temurin'\n          cache: gradle\n\n      - name: Setup Android SDK\n        uses: android-actions/setup-android@v3\n\n      - name: Grant execute permission for gradlew\n        run: chmod +x gradlew\n\n      - name: Build debug APK\n        run: |\n          ./gradlew app:assembleDebug -x lint \\\n            --build-cache \\\n            --parallel \\\n            --max-workers=4\n        env:\n          GRADLE_OPTS: -Xmx4g -Xms2g -XX:+HeapDumpOnOutOfMemoryError\n\n      - name: Build release APK (fdroid flavor)\n        run: |\n          ./gradlew app:assembleFdroidRelease -x lint \\\n            --build-cache \\\n            --parallel \\\n            --max-workers=4\n        env:\n          GRADLE_OPTS: -Xmx4g -Xms2g -XX:+HeapDumpOnOutOfMemoryError\n        continue-on-error: true\n\n      - name: List APK outputs\n        if: always()\n        run: |\n          echo \"Debug APK:\"\n          find app/build/outputs/apk -name \"*.apk\" -type f\n          echo \"\"\n          echo \"All outputs:\"\n          ls -lR app/build/outputs/\n\n      - name: Upload debug APK\n        uses: actions/upload-artifact@v4\n        if: success()\n        with:\n          name: debug-apk\n          path: app/build/outputs/apk/debug/\n          retention-days: 30\n\n      - name: Upload release APK (fdroid)\n        uses: actions/upload-artifact@v4\n        if: success()\n        with:\n          name: fdroid-release-apk\n          path: app/build/outputs/apk/fdroidRelease/\n          retention-days: 30\n          \n      - name: Comment on PR\n        if: github.event_name == 'pull_request' && success()\n        uses: actions/github-script@v7\n        with:\n          script: |\n            github.rest.issues.createComment({\n              issue_number: context.issue.number,\n              owner: context.repo.owner,\n              repo: context.repo.repo,\n              body: '✅ APK build completed successfully!\\n\\nDownload APK artifacts from the workflow run.'\n            })\n\n      - name: Build summary\n        if: always()\n        run: |\n          echo \"## Build Summary\" >> $GITHUB_STEP_SUMMARY\n          echo \"\" >> $GITHUB_STEP_SUMMARY\n          echo \"- **Repository:** ${{ github.repository }}\" >> $GITHUB_STEP_SUMMARY\n          echo \"- **Branch:** ${{ github.ref_name }}\" >> $GITHUB_STEP_SUMMARY\n          echo \"- **Commit:** ${{ github.sha }}\" >> $GITHUB_STEP_SUMMARY\n          echo \"- **Triggered by:** ${{ github.event_name }}\" >> $GITHUB_STEP_SUMMARY\n          echo \"- **Status:** ${{ job.status }}\" >> $GITHUB_STEP_SUMMARY\n