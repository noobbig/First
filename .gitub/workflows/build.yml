name: Build Android APK (Java 21)

on:
  push:
    branches:
      - main  # আপনার মেইন ব্রাঞ্চের নাম অনুযায়ী চেক করে নিন

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4 # লেটেস্ট v4 অ্যাকশন ব্যবহার করা ভালো
        with:
          java-version: '21' # এখানে Java 21 সেট করা হয়েছে
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk-java21
          path: app/build/outputs/apk/debug/app-debug.apk
